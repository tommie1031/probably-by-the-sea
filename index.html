<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>イルカのひみつきち</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="base" aria-label="イルカのひみつきち">
    <img class="room-image" src="room.png" alt="海が見える部屋" />

    <button class="hotspot window" data-action="window" aria-label="窓の外へ出てみる"></button>
    <button class="hotspot book" data-action="book" aria-label="本をひらく"></button>
    <button class="hotspot mug" data-action="mug" aria-label="マグカップを見る"></button>
    <button class="hotspot plant" data-action="plant" aria-label="ティネケを見る"></button>

    <div class="title">
      <h1>イルカのひみつきち</h1>
      <p>A place between journeys.</p>
    </div>

    <button id="sound" class="sound">波の音：OFF</button>

    <section id="panel" class="panel" aria-hidden="true">
      <button id="close" class="close">×</button>
      <h2 id="panelTitle"></h2>
      <p id="panelText"></p>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
